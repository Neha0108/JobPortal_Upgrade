<div class="auth-container">

  <div class="auth-card">

    <h2>Create Account</h2>

    <form [formGroup]="registerForm"
          (ngSubmit)="onSubmit()">

      <input
        type="text"
        placeholder="Username"
        formControlName="username">

      <input
        type="email"
        placeholder="Email"
        formControlName="email">

      <input
        type="password"
        placeholder="Password"
        formControlName="password">

      <div class="role-section">

        <h4>Select Role</h4>

        <div class="role-cards">

          <div
            class="role-card"
            [class.selected]="registerForm.value.role === 'ROLE_CANDIDATE'"
            (click)="selectRole('CANDIDATE')">

            <div class="radio-circle"></div>

            <div>
              <h5>Candidate</h5>
              <p>
                Apply jobs and track applications
              </p>
            </div>

          </div>

          <div
            class="role-card"
            [class.selected]="registerForm.value.role === 'ROLE_RECRUITER'"
            (click)="selectRole('RECRUITER')">

            <div class="radio-circle"></div>

            <div>
              <h5>Recruiter</h5>
              <p>
                Post jobs and hire candidates
              </p>
            </div>

          </div>

        </div>

      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid">

        Register

      </button>

    </form>

    <p>
      Already have an account?
      <a routerLink="/login">
        Login
      </a>
    </p>

  </div>

</div>
